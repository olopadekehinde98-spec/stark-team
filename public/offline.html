<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stark Team — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F1C2E;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 360px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #D4A017;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: #0F1C2E;
      margin-bottom: 24px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
    p  { font-size: 14px; color: #94A3B8; line-height: 1.6; margin-bottom: 28px; }
    button {
      padding: 12px 28px;
      border-radius: 8px;
      background: #D4A017;
      color: #0F1C2E;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ST</div>
    <h1>You're offline</h1>
    <p>No internet connection detected. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
